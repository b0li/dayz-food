<!DOCTYPE html>
<html lang="de">
<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="theme-color" content="#14150f">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="description" content="DayZ Nahrungsguide – Energie und Wasser auf einen Blick">
	<link rel="manifest" href="manifest.json">
	<link rel="apple-touch-icon" href="icon-192.png">
	<title>DayZ Nahrungsguide</title>

	<style>

		:root {
			--bg: #14150f;
			--bg-panel: rgba( 20, 22, 18, 0.82 );
			--bg-row: rgba( 28, 31, 26, 0.55 );
			--line: rgba( 120, 130, 110, 0.18 );
			--text: #d6d8cf;
			--text-dim: #8b9082;
			--text-head: #e8eae2;
			--energy: #d9a441;
			--water: #5aa9d6;
			--danger: #c8503c;
			--accent: #aeb89a;
			--pad: 32px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			-webkit-tap-highlight-color: transparent;
		}

		html, body {
			background: var(--bg);
			color: var(--text);
			font-family: "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
			font-size: 16px;
			line-height: 1.4;
			min-height: 100%;
			min-height: 100dvh;
			-webkit-font-smoothing: antialiased;
			overscroll-behavior: none;
		}

		body {
			background-image:
				linear-gradient( rgba( 16, 17, 13, 0.85 ), rgba( 16, 17, 13, 0.93 ) ),
				radial-gradient( circle at 30% 0%, #2c3327 0%, #14150f 60% );
			background-attachment: fixed;
		}

		.app {
			max-width: 1400px;
			margin: 0 auto;
		}

		@supports (padding-top: env(safe-area-inset-top)) {
			.app__header { padding-top: calc(18px + env(safe-area-inset-top)); }
		}

		.install-banner {
			display: none;
			margin: 10px 12px;
			padding: 12px 16px;
			background: rgba( 174, 184, 154, 0.1 );
			border: 1px solid rgba( 174, 184, 154, 0.25 );
			border-radius: 8px;
			font-size: 13px;
			color: var(--accent);
			text-align: center;
			line-height: 1.5;
		}

		.app__header {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
			padding: 18px var( --pad ) 16px;
		}

		.logo {
			display: block;
			width: 130px;
			height: auto;
		}

		.app__sub {
			margin-top: 6px;
			font-size: 11px;
			letter-spacing: 1px;
			color: var(--text-dim);
			text-transform: uppercase;
		}

		/* Language switch */
		.lang {
			display: flex;
			flex-shrink: 0;
			gap: 2px;
			padding: 3px;
			background: rgba( 10, 11, 8, 0.6 );
			border: 1px solid var(--line);
			border-radius: 7px;
		}

		.lang__btn {
			padding: 6px 11px;
			background: transparent;
			border: none;
			border-radius: 5px;
			color: var(--text-dim);
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 0.5px;
			cursor: pointer;
		}

		.lang__btn--active {
			color: #14150f;
			background: var(--accent);
		}

		.controls {
			padding: 0 var( --pad ) var( --pad );
			position: sticky;
			top: 0;
			z-index: 100;
		}

		.controls__card {
			padding: 14px 16px;
			background: var( --bg-panel );
			backdrop-filter: blur( 6px );
			-webkit-backdrop-filter: blur( 6px );
			border: 1px solid var( --line );
			border-radius: 8px;
		}

		.search {
			width: 100%;
			padding: 12px 14px;
			background: rgba( 10, 11, 8, 0.7 );
			border: 1px solid var(--line);
			border-radius: 6px;
			color: var(--text);
			font-size: 15px;
		}

		.search::placeholder {
			color: var(--text-dim);
		}

		.search:focus {
			outline: none;
			border-color: var(--accent);
		}

		.chips {
			display: flex;
			flex-wrap: wrap;
			gap: 16px;
			margin-top: 10px;
		}

		.chips__btn {
			flex-shrink: 0;
			padding: 7px 12px;
			background: var(--bg-row);
			border: 1px solid var(--line);
			border-radius: 20px;
			color: var(--text-dim);
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
		}

		.chips__btn--active {
			color: #14150f;
			background: var(--accent);
			border-color: var(--accent);
		}

		.sortbar {
			display: flex;
			flex-wrap: wrap;
			gap: 16px;
			margin-top: 10px;
		}

		.sortbar__btn {
			flex: 1;
			padding: 9px 6px;
			background: var(--bg-row);
			border: 1px solid var(--line);
			border-radius: 5px;
			color: var(--text-dim);
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
		}

		.sortbar__btn--active {
			color: var(--text-head);
			border-color: var(--accent);
			background: rgba( 60, 70, 50, 0.4 );
		}

		.states {
			display: flex;
			flex-wrap: wrap;
			gap: 16px;
			margin-top: 10px;
		}

		.states__btn {
			flex: 1 1 auto;
			min-width: max-content;
			padding: 8px 14px;
			background: rgba( 10, 11, 8, 0.5 );
			border: 1px solid var(--line);
			border-radius: 5px;
			color: var(--text-dim);
			font-size: 11px;
			font-weight: 700;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			cursor: pointer;
		}

		.states__btn--active {
			color: #14150f;
			background: var(--accent);
			border-color: var(--accent);
		}

		.list {
			padding: 16px var( --pad );
		}

		.items-grid {
			display: grid;
			grid-template-columns: repeat( auto-fill, minmax( 280px, 1fr ) );
			gap: 10px;
		}

		.item {
			display: flex;
			align-items: center;
			gap: 12px;
			padding: 12px 14px;
			margin-bottom: 6px;
			background: var(--bg-row);
			border: 1px solid var(--line);
			border-radius: 8px;
		}

		.item--danger {
			border-color: rgba( 200, 80, 60, 0.45 );
		}

		.item__body {
			flex: 1;
			min-width: 0;
		}

		.item__name {
			font-size: 14px;
			font-weight: 600;
			color: var(--text-head);
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		.item__en {
			margin-top: 1px;
			font-size: 10px;
			color: var(--text-dim);
			font-style: italic;
		}

		.item__cat {
			margin-top: 3px;
			font-size: 10px;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			color: var(--text-dim);
		}

		.item__tag {
			display: inline-block;
			margin-top: 4px;
			padding: 1px 7px;
			font-size: 9px;
			font-weight: 700;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			border-radius: 3px;
			background: rgba( 200, 80, 60, 0.2 );
			color: var(--danger);
		}

		.item__stats {
			display: flex;
			gap: 16px;
			flex-shrink: 0;
		}

		.stat {
			text-align: center;
			min-width: 48px;
		}

		.stat__val {
			font-size: 17px;
			font-weight: 700;
			line-height: 1;
		}

		.stat__val--energy {
			color: var(--energy);
		}

		.stat__val--water {
			color: var(--water);
		}

		.stat__val--na {
			color: var(--text-dim);
			opacity: 0.5;
		}

		.stat__label {
			margin-top: 4px;
			font-size: 9px;
			letter-spacing: 0.5px;
			text-transform: uppercase;
			color: var(--text-dim);
		}

		.empty {
			padding: 40px 20px;
			text-align: center;
			color: var(--text-dim);
			font-size: 14px;
		}

		.note {
			padding: 14px var( --pad ) 24px;
			font-size: 11px;
			line-height: 1.6;
			color: var(--text-dim);
		}

		@supports (padding-bottom: env(safe-area-inset-bottom)) {
			.note { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
		}

		@media ( max-width: 767px ) {
			:root { --pad: 12px; }
			.items-grid { grid-template-columns: 1fr; }

			/* Horizontal scroll with snap instead of wrapping */
			.chips,
			.states {
				flex-wrap: nowrap;
				gap: 8px;
				overflow-x: auto;
				scroll-snap-type: x proximity;
				-webkit-overflow-scrolling: touch;
				scrollbar-width: none;
				padding-bottom: 2px;
			}

			.chips::-webkit-scrollbar,
			.states::-webkit-scrollbar {
				display: none;
			}

			.chips__btn,
			.states__btn {
				flex: 0 0 auto;
				scroll-snap-align: start;
			}
		}

	</style>

</head>
<body>

	<div id="installBanner" class="install-banner">
		Tipp: Teilen → „Zum Home-Bildschirm" für App-Feeling + Offline-Nutzung
	</div>

	<div class="app">

		<header class="app__header">

			<div>
				<img class="logo" src="assets/img/logo.png" alt="DayZ" width="2000" height="895">
				<div class="app__sub" id="subtitle"></div>
			</div>

			<div class="lang" id="lang">
				<button class="lang__btn" data-lang="de">DE</button>
				<button class="lang__btn" data-lang="en">EN</button>
			</div>

		</header>

		<div class="controls">

			<div class="controls__card">

				<input
					type="text"
					class="search"
					id="search"
					autocomplete="off"

				<div class="chips" id="chips"></div>

		</div><!-- end /.controls -->

		<div class="list">
			<div class="items-grid" id="list"></div>
		</div>

		<p class="note" id="note"></p>

	</div>

			{ en: 'Zucchini', de: 'Zucchini', cat: 'produce', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },

			{ en: 'Field Mushroom', de: 'Wiesenchampignon', cat: 'mushroom', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Fly Amanita', de: 'Fliegenpilz', cat: 'mushroom', danger: 'poison', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Liberty Cap', de: 'Spitzkegeliger Kahlkopf', cat: 'mushroom', danger: 'hallu', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Oyster Mushroom', de: 'Austernpilz', cat: 'mushroom', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Parasol Mushroom', de: 'Parasolpilz', cat: 'mushroom', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Penny Bun', de: 'Steinpilz', cat: 'mushroom', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Red Pine Mushroom', de: 'Edelreizker', cat: 'mushroom', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } },
			{ en: 'Wood Ear', de: 'Judasohr', cat: 'mushroom', states: { raw: [ 20, 95 ], baked: [ 35, 71.25 ], boiled: [ 25, 95 ], dried: [ 20, 9.5 ], burned: [ 15, 23.75 ], rotten: [ 15, 47.5 ] } }

		];

		const state = {
			lang: 'de',
			cat: 'all',
			itemState: 'raw',
			sort: 'name',
			query: ''
		};

		const elList = document.getElementById( 'list' );
		const elSearch = document.getElementById( 'search' );
		const elStates = document.getElementById( 'states' );
		const elChips = document.getElementById( 'chips' );
		const elSortbar = document.getElementById( 'sortbar' );
		const elNote = document.getElementById( 'note' );
		const elLang = document.getElementById( 'lang' );
		const elSubtitle = document.getElementById( 'subtitle' );

		function t() {

			return I18N[ state.lang ];

		}

		// Detect browser language, default de
		function detectLang() {

			const nav = ( navigator.language || 'de' ).toLowerCase();
			return nav.startsWith( 'en' ) ? 'en' : 'de';

		}

		function buildChips() {

			const tr = t();
			let html = '<button class="chips__btn" data-cat="all">' + tr.all + '</button>';

			CAT_ORDER.forEach( ( key ) => {

				html += '<button class="chips__btn" data-cat="' + key + '">' + tr.categories[ key ] + '</button>';

			});

			elChips.innerHTML = html;

			elChips.querySelectorAll( '.chips__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'chips__btn--active', b.dataset.cat === state.cat );
			});

		}

		function buildSortbar() {

			const tr = t();

			elSortbar.innerHTML =
				'<button class="sortbar__btn" data-sort="name">' + tr.sortName + '</button>' +
				'<button class="sortbar__btn" data-sort="energy">' + tr.sortEnergy + '</button>' +
				'<button class="sortbar__btn" data-sort="water">' + tr.sortWater + '</button>';

			elSortbar.querySelectorAll( '.sortbar__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'sortbar__btn--active', b.dataset.sort === state.sort );
			});

		}

		function buildStates() {

			const tr = t();
			let html = '';

			STATE_ORDER.forEach( ( key ) => {

				html += '<button class="states__btn" data-state="' + key + '">' + tr.states[ key ] + '</button>';

			});

			elStates.innerHTML = html;

			elStates.querySelectorAll( '.states__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'states__btn--active', b.dataset.state === state.itemState );
			});

		}

		function getStat( item, stateKey, idx ) {

			const arr = item.states[ stateKey ];

			if ( ! arr ) {
				return null;
			}

			return arr[ idx ];

		}

		function syncAvailableStates( items ) {

			elStates.querySelectorAll( '.states__btn' ).forEach( ( btn ) => {

				const key = btn.dataset.state;
				const available = items.some( ( item ) => item.states[ key ] );
				btn.style.opacity = available ? '1' : '0.35';

			});

		}

		function render() {

			const tr = t();

			let items = ITEMS.filter( ( item ) => {

				const matchCat = state.cat === 'all' || item.cat === state.cat;
				const q = state.query;
				const matchQuery = ! q ||
					item.en.toLowerCase().includes( q ) ||
					item.de.toLowerCase().includes( q );

				return matchCat && matchQuery;

			});

			syncAvailableStates( items );

			if ( state.sort === 'name' ) {

				const nameKey = state.lang;
				items = items.slice().sort( ( a, b ) => a[ nameKey ].localeCompare( b[ nameKey ] ) );

			} else {

				const idx = state.sort === 'energy' ? 0 : 1;

				items = items.slice().sort( ( a, b ) => {

					const av = getStat( a, state.itemState, idx ) ?? -1;
					const bv = getStat( b, state.itemState, idx ) ?? -1;

					return bv - av;

				});

			}

			if ( ! items.length ) {
				elList.innerHTML = '<div class="empty">' + tr.empty + '</div>';
				return;
			}

			elList.innerHTML = items.map( ( item ) => {

				const energy = getStat( item, state.itemState, 0 );
				const water = getStat( item, state.itemState, 1 );

				const mainName = state.lang === 'de' ? item.de : item.en;
				const subName = state.lang === 'de' ? item.en : '';

				const enLine = subName
					? '<div class="item__en">' + subName + '</div>'
					: '';

				const danger = item.danger
					? '<span class="item__tag">' + tr.dangers[ item.danger ] + '</span>'
					: '';

				const energyCell = energy === null
					? '<div class="stat__val stat__val--na">&mdash;</div>'
					: '<div class="stat__val stat__val--energy">' + energy + '</div>';

				const waterCell = water === null
					? '<div class="stat__val stat__val--na">&mdash;</div>'
					: '<div class="stat__val stat__val--water">' + water + '</div>';

				return '' +
					'<div class="item' + ( item.danger ? ' item--danger' : '' ) + '">' +
						'<div class="item__body">' +
							'<div class="item__name">' + mainName + '</div>' +
							enLine +
							'<div class="item__cat">' + tr.categories[ item.cat ] + '</div>' +
							danger +
						'</div>' +
						'<div class="item__stats">' +
							'<div class="stat">' +
								energyCell +
								'<div class="stat__label">kcal</div>' +
							'</div>' +
							'<div class="stat">' +
								waterCell +
								'<div class="stat__label">ml</div>' +
							'</div>' +
						'</div>' +
					'</div>';

			}).join( '' );

		}

		function applyLang() {

			const tr = t();

			document.documentElement.lang = state.lang;
			document.title = state.lang === 'de' ? 'DayZ Nahrungsguide' : 'DayZ Food Guide';
			elSubtitle.textContent = tr.subtitle;
			elSearch.placeholder = tr.searchPlaceholder;
			elNote.innerHTML = tr.note;

			elLang.querySelectorAll( '.lang__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'lang__btn--active', b.dataset.lang === state.lang );
			});

			buildChips();
			buildSortbar();
			buildStates();
			render();

		}

		// Events

		elLang.addEventListener( 'click', ( e ) => {

			const btn = e.target.closest( '.lang__btn' );

			if ( ! btn ) {
				return;
			}

			state.lang = btn.dataset.lang;
			applyLang();

		});

		elChips.addEventListener( 'click', ( e ) => {

			const btn = e.target.closest( '.chips__btn' );

			if ( ! btn ) {
				return;
			}

			state.cat = btn.dataset.cat;

			elChips.querySelectorAll( '.chips__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'chips__btn--active', b === btn );
			});

			render();

		});

		elStates.addEventListener( 'click', ( e ) => {

			const btn = e.target.closest( '.states__btn' );

			if ( ! btn ) {
				return;
			}

			state.itemState = btn.dataset.state;

			elStates.querySelectorAll( '.states__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'states__btn--active', b === btn );
			});

			render();

		});

		elSortbar.addEventListener( 'click', ( e ) => {

			const btn = e.target.closest( '.sortbar__btn' );

			if ( ! btn ) {
				return;
			}

			state.sort = btn.dataset.sort;

			elSortbar.querySelectorAll( '.sortbar__btn' ).forEach( ( b ) => {
				b.classList.toggle( 'sortbar__btn--active', b === btn );
			});

			render();

		});

		elSearch.addEventListener( 'input', ( e ) => {

			state.query = e.target.value.trim().toLowerCase();
			render();

		});

		state.lang = detectLang();
		applyLang();

	</script>

</body>
</html>
